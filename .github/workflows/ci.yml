name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Blocking gates: these pass and must stay green on every PR.
  # Matrix covers the full requires-python range (>=3.13): 3.13 is what most
  # installs from PyPI get, 3.14 is what the Docker image ships.
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Format check (black)
        run: uv run black --check src/ tests/

      - name: Import order (isort)
        run: uv run isort --check-only src/ tests/

      - name: Tests
        run: uv run pytest

  # Blocking gate: src/ type-checks clean under strict mypy. Keep it green.
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Type check (mypy)
        run: uv run mypy src
